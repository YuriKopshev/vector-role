---
- name: Vector | Get distr
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: "0644"

- name: Vector | Unarchive
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "/tmp"
    remote_src: true

- name: Vector | Install
  become: true
  ansible.builtin.copy:
    src: "/tmp/vector-{{ vector_version }}-x86_64-unknown-linux-musl/bin/vector"
    dest: "/usr/bin/vector"
    mode: "0755"
    remote_src: true

- name: Vector | Configure
  become: true
  ansible.builtin.template:
    src: "vector.toml.j2"
    dest: "{{ vector_config_file }}"
    mode: "0644"
  notify: Restart vector
